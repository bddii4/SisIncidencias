{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Reportes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'css/reporte_incidencia.css' %}" />
</head>
<body>

    <div class="page">

        <div class="header-card">
            <div>
                <h1><i class="fas fa-exclamation-triangle"></i> Mis Reportes</h1>
                <p>Administra tus incidencias reportadas</p>
            </div>
            <button class="btn-nuevo" id="btnNuevo"><i class="fas fa-plus"></i> Nuevo reporte</button>
        </div>

        <div class="form-card" id="formCard">
            <div class="form-body">
                <form id="reportForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre completo</label>
                            <input type="text" id="nombre" placeholder="Ej. Juan Pérez López" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-building"></i> Área / Departamento</label>
                            <input type="text" id="area" placeholder="Ej. Sistemas, Contabilidad..." required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Título del reporte</label>
                        <input type="text" id="titulo" placeholder="Ej. Caída de red en oficina principal" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-desktop"></i> Sistema / Módulo afectado</label>
                        <input type="text" id="sistema" placeholder="Ej. SAP, Red corporativa, Laptop..." required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Descripción detallada</label>
                        <textarea id="descripcion" placeholder="Describe el problema con el mayor detalle posible..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-history"></i> ¿Qué estabas haciendo cuando ocurrió?</label>
                        <textarea id="procesos" placeholder="Describe los pasos antes del problema..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-paperclip"></i> Evidencia <span style="font-weight:400;color:#94a3b8;">(opcional)</span></label>
                        <div class="file-upload" id="fileUploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Haz clic para adjuntar capturas o video</p>
                            <input type="file" id="fileInput" accept="image/*,video/*" multiple>
                        </div>
                        <div class="file-list" id="fileList"></div>
                    </div>
                    <button type="submit" class="btn-enviar" id="btnSubmit"><i class="fas fa-paper-plane"></i> Enviar reporte</button>
                </form>
            </div>
        </div>

        <div class="report-list" id="reportList"></div>

        <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Volver al sistema</a>
    </div>

    <div class="modal-overlay" id="modalTicket">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitulo"></h3>
            <button class="close-modal" onclick="cerrarModalTicket()">&times;</button>
        </div>
        <div class="modal-body" id="modalTicketBody"></div>
    </div>
</div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

    <script src="{% static 'js/reporte_incidencia.js' %}"></script>
</body>
</html>
