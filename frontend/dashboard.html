<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Incidencias</title>
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>
    <header>
        <h1>Sistema de Incidencias</h1>
        <div class="user-info">
            <span id="username">Usuario</span>
            <a href="/logout">Cerrar sesión</a>
        </div>
    </header>

    <div class="container">
        <div class="welcome">
            <h2>Bienvenido</h2>
            <p>Selecciona una opción para comenzar.</p>
        </div>

        <div class="card">
            <h3>Reportar una incidencia</h3>
            <p style="color: #555; margin-bottom: 1rem;">Crea un nuevo reporte de incidencia.</p>
            <a href="#" class="btn">Nueva Incidencia</a>
        </div>

        <div class="card">
            <h3>Mis incidencias</h3>
            <p style="color: #555; margin-bottom: 1rem;">Consulta el estado de tus reportes.</p>
            <a href="#" class="btn">Ver incidencias</a>
        </div>
    </div>
</body>
</html>
